<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/stylesContacto.css">
    <link rel="icon" href="../img/logo2.png">
    <title>Contacto</title>
</head>


<body>
    <header>
        <div class="logo-container">
            <img src="../img/logo.png" alt="Gobierno de Jujuy">
        </div>

        <a href="/pages/Home.html" class="title-link">
            <h1>Ministerio de Turismo de JUJUY</h1>
        </a>

        <nav>
            <details>
                <summary>Menú</summary>
                <ul>
                    <li><a href="Destinos.html">Destinos</a></li>
                    <li><a href="Agencias.html">Agencias</a></li>
                    <li><a href="Precios.html">Precios</a></li>
                    <li><a href="Contacto.html">Contacto</a></li>
                    <li><a href="Blog.html">Blog</a></li>
                </ul>
            </details>
        </nav>
    </header>
    <section class="contacto">

        <h2>Contacto</h2>

        <form id="formulario" class="formulario">

            <div class="grupo">
                <input type="text" required>
                <label>Nombre</label>
            </div>

            <div class="grupo">
                <input type="email" required>
                <label>Email</label>
            </div>

            <div class="grupo">
                <input type="tel" pattern="[0-9]{10}" required>
                <label>Teléfono</label>
            </div>

            <div class="grupo">
                <textarea required></textarea>
                <label>Mensaje</label>
            </div>

            <button type="submit" id="btnEnviar">
                Enviar
                <span class="spinner"></span>
            </button>

        </form>

    </section>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-contenido">
            <h3>✔ Mensaje enviado</h3>
            <p>Nos contactaremos contigo pronto.</p>
            <button onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>
    <footer>
        <div class="footer-contenido">

            <div class="newsletter">
                <h3>Suscribite</h3>
                <input type="email" placeholder="Tu email">
                <button>Enviar</button>
            </div>

            <div class="redes-sociales">
                <h3>Seguinos</h3>
                <div class="iconos-redes">
                    <a href="https://www.facebook.com/VisitJujuyOfficial" aria-label="Facebook">FB</a>
                    <a href="https://www.instagram.com/visitjujuy/" aria-label="Instagram">IG</a>
                    <a href="https://x.com/VisitJujuy" aria-label="X">X</a>
                </div>
            </div>

            <iframe class="mapa"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1841315.6582522434!2d-67.57564756543167!3d-23.31557088998188!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9408a2879577c385%3A0x6009a29631248f3b!2sJujuy!5e0!3m2!1ses-419!2sar!4v1713000000000!5m2!1ses-419!2sar"
                allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>

        </div>

        <div class="footer-bottom">
            <p>&copy; 2026 Turismo Jujuy. Todos los derechos reservados.</p>
        </div>
    </footer>
</body>
<script>
    const form = document.getElementById("formulario");
    const btn = document.getElementById("btnEnviar");
    const modal = document.getElementById("modal");

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        // Al deshabilitar el botón, el CSS activa automáticamente el spinner
        btn.disabled = true;


        setTimeout(() => {
            // Al volver a habilitar el botón, el spinner desaparece por CSS
            btn.disabled = false;

            // Mostramos el modal de éxito
            modal.classList.add("activo");

            // Limpia los campos del formulario
            form.reset();
        }, 2000);
    });

    function cerrarModal() {
        modal.classList.remove("activo");
    }
</script>

</html>
